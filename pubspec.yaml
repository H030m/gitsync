name: gitsync
description: "GitSync — GitHub × Discord 整合 + AI Agent 任務助手"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # 課程指定（state mgmt + 路由）
  provider: ^6.1.2
  go_router: ^14.0.2

  # Firebase
  firebase_core: ^2.26.0
  firebase_auth: ^4.4.0
  cloud_firestore: ^4.15.7
  cloud_functions: ^4.7.5
  firebase_messaging: ^14.9.2
  firebase_storage: ^11.1.0

  # UI
  google_fonts: ^6.1.0
  flutter_native_splash: ^2.3.10

  # Stats 圓餅圖 / 長條圖（Sprint 5 用；先加上方便骨架展示）
  fl_chart: ^0.66.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
